<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #0b0c10;
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .bg-gradient-mesh {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      background: 
        radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.12) 0%, transparent 45%);
      filter: blur(80px);
    }
    .glass-card {
      background: rgba(22, 25, 38, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1rem;
      padding: 2.5rem 1.5rem;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    .spinner {
      width: 3rem;
      height: 3rem;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    .text-secondary {
      color: #9ca3af;
    }
    .mt-6 { margin-top: 1.5rem; }
    .mt-2 { margin-top: 0.5rem; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.25rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
    }
    .btn-primary:hover {
      filter: brightness(1.1);
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="bg-gradient-mesh"></div>
  
  <div class="redirect-container">
    <div class="glass-card redirect-card" style="max-width: 400px; padding: 2.5rem 1.5rem;">
      <div class="spinner spinner-lg"></div>
      <h2 class="mt-6" style="font-size: 1.5rem;">Redirecting...</h2>
      <p class="text-secondary mt-2" style="font-size: 0.9rem;">Please wait while we route your request.</p>
    </div>
  </div>

  <script>
    // GitHub Pages Custom Clean URL Router supporting Subfolders
    (function() {
      const pathname = window.location.pathname;

      // 1. Detect if root path (ends with slash, or is empty, or is index.html)
      if (pathname === '/' || pathname.endsWith('/') || pathname.endsWith('/index.html')) {
        // Construct path to index.html in the same directory context
        const base = pathname.endsWith('/index.html') 
          ? pathname.slice(0, -10) 
          : pathname;
        window.location.replace(base + 'index.html');
        return;
      }

      // 2. Clean up segments
      const segments = pathname.split('/').filter(Boolean);
      if (segments.length === 0) {
        window.location.replace('/index.html');
        return;
      }

      // Get short code (always the last segment)
      const code = segments[segments.length - 1];

      // Check if it looks like a system file or static folder
      const isSystemFile = code.includes('.') || 
                           code === 'admin' || 
                           code === 'go' ||
                           segments.includes('css') || 
                           segments.includes('js');

      if (isSystemFile) {
        // If it is an actual missing file/resource, show a custom 404 styling
        document.title = "Page Not Found";
        const card = document.querySelector('.glass-card');
        card.innerHTML = `
          <div style="font-size: 3rem; margin-bottom: 1rem;">⚠️</div>
          <h2>Page Not Found</h2>
          <p class="text-secondary mt-2">The requested resource could not be found.</p>
          <a href="./index.html" class="btn btn-primary mt-6">Go to Admin Dashboard</a>
        `;
        return;
      }

      // 3. Determine the base path for redirect (all segments except the last code)
      const baseSegments = segments.slice(0, -1);
      const basePath = '/' + baseSegments.map(s => s + '/').join('');
      
      // Redirect to go.html with code query param
      window.location.replace(basePath + 'go.html?code=' + encodeURIComponent(code));
    })();
  </script>
</body>
</html>
